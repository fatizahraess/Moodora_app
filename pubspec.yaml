name: focusflow
description: "A local Pomodoro, task, and statistics Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_local_notifications: ^19.5.0
  flutter_svg: ^2.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/moodora_icon.svg
